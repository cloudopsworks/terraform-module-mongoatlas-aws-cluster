# Module configuration

name_prefix: ""  # (Optional) Prefix for the name of the resources. Default: ""
name: ""         # (Required) Name of the MongoDB Atlas cluster resource.
project_id: ""   # (Optional) The Atlas project ID where the cluster will be created. Use either project_id or project_name.
project_name: "" # (Optional) The Atlas project name where the cluster will be created. Use either project_id or project_name.
run_hoop: false  # (Optional) Run HOOP CLI via null_resource local-exec. Requires HOOP CLI installed and authenticated on the runner. Default: false

# settings:
#   cluster_type: "REPLICASET"         # (Optional) REPLICASET | SHARDED | GEOSHARDED. Default: "REPLICASET"
